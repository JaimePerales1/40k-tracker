<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Tracker — Warhammer 40,000</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #121014;
    --panel: #1b181e;
    --panel-edge: #2a2530;
    --steel: #8d8593;
    --bone: #e8e2d6;
    --gold: #c9a227;
    --gold-dim: #7a6420;
    --blood: #a4353c;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,162,39,0.07), transparent);
    color: var(--bone);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px 14px 40px;
  }

  .app { width: 100%; max-width: 460px; }

  /* ---------- Header ---------- */
  header { text-align: center; margin-bottom: 22px; }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--steel);
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 0.08em;
    color: var(--gold);
    text-transform: uppercase;
  }

  h1::after {
    content: "";
    display: block;
    width: 120px;
    height: 1px;
    margin: 10px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  /* ---------- Round rail ---------- */
  .round-section { margin-bottom: 24px; }

  .round-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--steel);
    margin-bottom: 10px;
  }

  .round-rail {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .round-plate {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 20px;
    text-align: center;
    padding: 12px 0 10px;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 6px;
    color: #4a444f;
    position: relative;
    transition: color .25s, border-color .25s, background .25s;
  }

  .round-plate.done { color: var(--gold-dim); border-color: var(--gold-dim); }

  .round-plate.active {
    color: var(--void);
    background: linear-gradient(180deg, #e0bb45, var(--gold));
    border-color: var(--gold);
    box-shadow: 0 0 18px rgba(201,162,39,0.35);
  }

  .round-controls {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .round-btn {
    flex: 1;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: background .15s;
  }

  .round-btn.secondary-btn {
    flex: 0 0 auto;
    padding: 12px 16px;
    border-color: var(--panel-edge);
    color: var(--steel);
  }

  .round-btn:hover { background: rgba(201,162,39,0.1); }
  .round-btn:active { transform: translateY(1px); }
  .round-btn:disabled { opacity: .35; cursor: default; }

  .game-over {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--blood);
    margin-top: 10px;
    text-transform: uppercase;
    display: none;
  }

  /* ---------- Total ---------- */
  .total-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--gold-dim);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 18px;
  }

  .total-bar .label {
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--steel);
  }

  .total-bar .value {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 34px;
    color: var(--gold);
    line-height: 1;
  }

  /* ---------- Counter cards ---------- */
  .card {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .card-title {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--bone);
  }

  .card-cap {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--steel);
    text-transform: uppercase;
  }

  .counter-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .count {
    flex: 1;
    text-align: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 52px;
    line-height: 1;
    color: var(--bone);
    font-variant-numeric: tabular-nums;
  }

  .btn {
    width: 58px;
    height: 58px;
    border-radius: 8px;
    border: 1px solid var(--panel-edge);
    background: #221e27;
    color: var(--bone);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 26px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    user-select: none;
  }

  .btn:hover { border-color: var(--gold-dim); background: #2a2530; }
  .btn:active { transform: translateY(1px); }
  .btn.minus { color: var(--blood); }
  .btn.plus  { color: var(--gold); }

  .quick-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .quick {
    flex: 1;
    padding: 9px 0;
    border-radius: 6px;
    border: 1px solid var(--panel-edge);
    background: transparent;
    color: var(--steel);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }

  .quick:hover { color: var(--gold); border-color: var(--gold-dim); }
  .quick:active { transform: translateY(1px); }

  /* ---------- Footer ---------- */
  .reset-btn {
    width: 100%;
    margin-top: 8px;
    padding: 13px;
    border-radius: 6px;
    border: 1px solid var(--blood);
    background: transparent;
    color: var(--blood);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s;
  }

  .reset-btn:hover { background: rgba(164,53,60,0.1); }

  .confirm-row {
    display: none;
    gap: 8px;
    margin-top: 8px;
  }

  .confirm-row button {
    flex: 1;
    padding: 13px;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--panel-edge);
    background: var(--panel);
    color: var(--steel);
  }

  .confirm-row .confirm-yes {
    border-color: var(--blood);
    color: var(--bone);
    background: var(--blood);
  }

  footer {
    text-align: center;
    margin-top: 26px;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #4a444f;
  }

  button:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">In the grim darkness of the far future</div>
    <h1>Battle Tracker</h1>
  </header>

  <!-- Round -->
  <section class="round-section">
    <div class="round-label">
      <span>Battle Round</span>
      <span id="roundText">Round 1 of 5</span>
    </div>
    <div class="round-rail" id="roundRail">
      <div class="round-plate active">I</div>
      <div class="round-plate">II</div>
      <div class="round-plate">III</div>
      <div class="round-plate">IV</div>
      <div class="round-plate">V</div>
    </div>
    <div class="round-controls">
      <button class="round-btn secondary-btn" id="prevRound" onclick="changeRound(-1)" disabled>◂ Back</button>
      <button class="round-btn" id="nextRound" onclick="changeRound(1)">Next Round ▸</button>
    </div>
    <div class="game-over" id="gameOver">☠ Battle Complete ☠</div>
  </section>

  <!-- Total -->
  <div class="total-bar">
    <span class="label">Total Victory Points</span>
    <span class="value" id="totalVP">0</span>
  </div>

  <!-- Primary -->
  <section class="card">
    <div class="card-head">
      <span class="card-title">Primary</span>
      <span class="card-cap">Max 50 VP</span>
    </div>
    <div class="counter-row">
      <button class="btn minus" onclick="adjust('primary', -1)" aria-label="Primary minus 1">−</button>
      <div class="count" id="primaryCount">0</div>
      <button class="btn plus" onclick="adjust('primary', 1)" aria-label="Primary plus 1">+</button>
    </div>
    <div class="quick-row">
      <button class="quick" onclick="adjust('primary', 5)">+5</button>
      <button class="quick" onclick="adjust('primary', 10)">+10</button>
      <button class="quick" onclick="adjust('primary', 15)">+15</button>
    </div>
  </section>

  <!-- Secondary -->
  <section class="card">
    <div class="card-head">
      <span class="card-title">Secondary</span>
      <span class="card-cap">Max 40 VP</span>
    </div>
    <div class="counter-row">
      <button class="btn minus" onclick="adjust('secondary', -1)" aria-label="Secondary minus 1">−</button>
      <div class="count" id="secondaryCount">0</div>
      <button class="btn plus" onclick="adjust('secondary', 1)" aria-label="Secondary plus 1">+</button>
    </div>
    <div class="quick-row">
      <button class="quick" onclick="adjust('secondary', 2)">+2</button>
      <button class="quick" onclick="adjust('secondary', 3)">+3</button>
      <button class="quick" onclick="adjust('secondary', 5)">+5</button>
    </div>
  </section>

  <!-- Command Points -->
  <section class="card">
    <div class="card-head">
      <span class="card-title">Command Points</span>
      <span class="card-cap">+1 each command phase</span>
    </div>
    <div class="counter-row">
      <button class="btn minus" onclick="adjust('cp', -1)" aria-label="Command points minus 1">−</button>
      <div class="count" id="cpCount">0</div>
      <button class="btn plus" onclick="adjust('cp', 1)" aria-label="Command points plus 1">+</button>
    </div>
  </section>

  <button class="reset-btn" id="resetBtn" onclick="showConfirm()">New Battle</button>
  <div class="confirm-row" id="confirmRow">
    <button onclick="hideConfirm()">Cancel</button>
    <button class="confirm-yes" onclick="resetGame()">Reset Everything</button>
  </div>

  <footer>The Emperor Protects</footer>
</div>

<script>
  const CAPS = { primary: 50, secondary: 40, cp: 99 };
  let state = { primary: 0, secondary: 0, cp: 0, round: 1 };

  function adjust(key, delta) {
    state[key] = Math.min(CAPS[key], Math.max(0, state[key] + delta));
    render();
  }

  function changeRound(delta) {
    state.round = Math.min(6, Math.max(1, state.round + delta));
    // Gaining a CP at the start of each new round's command phase (house-convenient nudge is left manual)
    render();
  }

  function render() {
    document.getElementById('primaryCount').textContent = state.primary;
    document.getElementById('secondaryCount').textContent = state.secondary;
    document.getElementById('cpCount').textContent = state.cp;
    document.getElementById('totalVP').textContent = state.primary + state.secondary;

    const plates = document.querySelectorAll('.round-plate');
    plates.forEach((p, i) => {
      p.classList.remove('active', 'done');
      if (i + 1 < state.round) p.classList.add('done');
      if (i + 1 === state.round && state.round <= 5) p.classList.add('active');
      if (state.round === 6) p.classList.add('done');
    });

    const over = state.round === 6;
    document.getElementById('roundText').textContent = over ? 'Battle ended' : `Round ${state.round} of 5`;
    document.getElementById('gameOver').style.display = over ? 'block' : 'none';
    document.getElementById('nextRound').disabled = over;
    document.getElementById('nextRound').textContent = state.round === 5 ? 'End Battle ▸' : 'Next Round ▸';
    document.getElementById('prevRound').disabled = state.round === 1;
  }

  function showConfirm() {
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('confirmRow').style.display = 'flex';
  }

  function hideConfirm() {
    document.getElementById('resetBtn').style.display = 'block';
    document.getElementById('confirmRow').style.display = 'none';
  }

  function resetGame() {
    state = { primary: 0, secondary: 0, cp: 0, round: 1 };
    hideConfirm();
    render();
  }

  render();
</script>
</body>
</html>
